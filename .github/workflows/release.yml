name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (format: vX.Y.Z)"
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  verify-version:
    name: Verify Tag and Crate Version
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
      release_version: ${{ steps.version.outputs.release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match vX.Y.Z, got: ${tag}"
            exit 1
          fi

          echo "release_tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2

      - name: Verify Cargo.toml version matches tag
        id: version
        run: |
          pkgid="$(cargo pkgid)"
          crate_version="${pkgid##*@}"
          if [[ "${crate_version}" == "${pkgid}" ]]; then
            crate_version="${pkgid##*#}"
          fi

          tag_version="${{ steps.tag.outputs.release_tag }}"
          tag_version="${tag_version#v}"

          if [[ -z "${crate_version}" ]]; then
            echo "Could not resolve crate version for acp-ws-bridge"
            exit 1
          fi

          if [[ "${crate_version}" != "${tag_version}" ]]; then
            echo "Tag/version mismatch: tag=${tag_version}, crate=${crate_version}"
            exit 1
          fi

          echo "release_version=${crate_version}" >> "${GITHUB_OUTPUT}"

  quality-release:
    name: Release Quality Gates
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-version.outputs.release_tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-targets --all-features

      - name: Package dry-run
        run: cargo package --locked --no-verify

  build-artifacts:
    name: Build Artifacts (${{ matrix.target }})
    needs:
      - verify-version
      - quality-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_suffix: ""
          - os: macos-13
            target: x86_64-apple-darwin
            binary_suffix: ""
          - os: macos-14
            target: aarch64-apple-darwin
            binary_suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_suffix: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-version.outputs.release_tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Compute artifact names
        id: names
        shell: bash
        run: |
          asset_base="acp-ws-bridge-${{ needs.verify-version.outputs.release_tag }}-${{ matrix.target }}"
          echo "asset_base=${asset_base}" >> "${GITHUB_OUTPUT}"

      - name: Stage artifact content
        shell: bash
        run: |
          stage_dir="dist/${{ steps.names.outputs.asset_base }}"
          mkdir -p "${stage_dir}"

          cp "target/${{ matrix.target }}/release/acp-ws-bridge${{ matrix.binary_suffix }}" "${stage_dir}/"
          cp README.md LICENSE "${stage_dir}/"

          test -f "${stage_dir}/README.md"
          test -f "${stage_dir}/LICENSE"
          test -f "${stage_dir}/acp-ws-bridge${{ matrix.binary_suffix }}"

      - name: Archive artifact (tar.gz)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          tar -C dist -czf "dist/${{ steps.names.outputs.asset_base }}.tar.gz" "${{ steps.names.outputs.asset_base }}"

      - name: Archive artifact (zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/${{ steps.names.outputs.asset_base }}/*" -DestinationPath "dist/${{ steps.names.outputs.asset_base }}.zip"

      - name: Upload artifact (tar.gz)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/${{ steps.names.outputs.asset_base }}.tar.gz
          if-no-files-found: error

      - name: Upload artifact (zip)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/${{ steps.names.outputs.asset_base }}.zip
          if-no-files-found: error

  publish-crates-io:
    name: Publish to crates.io
    needs:
      - verify-version
      - build-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-version.outputs.release_tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2

      - name: Validate crates.io token
        run: |
          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "CARGO_REGISTRY_TOKEN is not configured."
            exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish crate
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-github-release:
    name: Publish GitHub Release
    needs:
      - verify-version
      - build-artifacts
      - publish-crates-io
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify-version.outputs.release_tag }}
          name: ${{ needs.verify-version.outputs.release_tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.zip
