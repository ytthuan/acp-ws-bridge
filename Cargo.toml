[package]
name = "acp-ws-bridge"
version = "0.1.0"
edition = "2021"
description = "WebSocket bridge between GitHub Copilot CLI (ACP) and remote clients"

[dependencies]
tokio = { version = "1", features = ["full"] }
tokio-tungstenite = "0.24"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap = { version = "4", features = ["derive"] }
axum = "0.7"
tower-http = { version = "0.5", features = ["cors", "trace"] }
rustls = "0.23"
tokio-rustls = "0.26"
rcgen = "0.13"
anyhow = "1"
